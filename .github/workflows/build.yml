name: Build APK & EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-rust:
    name: Build & Test Rust Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Check Rust Core
        run: cd securevault-core && cargo check

      - name: Build Rust Core
        run: cd securevault-core && cargo build

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v2

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/*.apk

  build-exe:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Build EXE
        run: cd windows && cargo tauri build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SecureVault.exe
          path: windows/src-tauri/target/release/*.exe